<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngkorGuide</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="./img/logo.webp">
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="hero-header">
        <img src="img/logo.webp" alt="Angkor Wat">
        <div class="hero-text">
            <h2>Travel with a local legend</h2>
            <h1>Kingdom of Wonder</h1>
            <p>
                Go beyond the guidebooks with the wisdom of Cambodia's most respected local experts.
            </p>
            <div class="hero-buttons">
                <button class="exp-btn">
                    Start Your Inquiry
                </button>
            </div>
        </div>
    </div>

    <div class="text-container">
        <div class="left">
            <p>THE ESSENCE</p>
            <h3>The AngkorGuide Experience</h3>
        </div>
        <div class="right">
            <p>
                We believe true discovery happens when you are led by those who carry the stories of the land in their hearts.
            </p>
        </div>
    </div>

    <script src="./script/nav-bar.js"></script>
</body>
</html>
